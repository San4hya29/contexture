server:
  port: 3000
  host: "localhost"

aws:
  region: "us-west-2"

mcp:
  server_name: "aws-infrastructure-server"
  version: "1.0.0"

agent:
  provider: "gemini"
  model: "gemini-flash-latest"
  max_tokens: 8192
  temperature: 0.0
  dry_run: false
  auto_resolve_conflicts: false
  enable_debug: true

logging:
  level: "info"
  format: "text"
  output: "stdout"

state:
  file_path: "./states/infrastructure-state.json"
  backup_enabled: true
  backup_dir: "./backups"

web:
  port: 8080
  host: "localhost"
  template_dir: "web/templates"
  static_dir: "web/static"
  enable_websockets: true