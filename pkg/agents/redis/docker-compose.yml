version: "3.8"

services:
  # Local Redis Deployment
  redis:
    image: redis:7.2-alpine
    container_name: copilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RedisInsight for UI-based DB inspection
  redisinsight:
    image: redis/redisinsight:latest
    container_name: copilot-redisinsight
    ports:
      - "8001:8001"
    depends_on:
      - redis
